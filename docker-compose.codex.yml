services:
  lujie-careerkit:
    build:
      context: .
    image: lujie-careerkit:codex
    command: ["node", "scripts/docker-runtime.mjs", "app"]
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_URL: file:/data/dev.db
      LUJIE_RUNTIME_CONFIG_DIR: /runtime-config
      CODEX_BRIDGE_URL: http://codex-bridge:4318
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-qwen3.6-flash}
    volumes:
      - lujie-data:/data
      - lujie-runtime-config:/runtime-config
    depends_on:
      - codex-bridge
    restart: unless-stopped

  codex-bridge:
    image: lujie-careerkit:codex
    command: ["node", "scripts/docker-runtime.mjs", "bridge"]
    environment:
      CODEX_HOME: /codex
      CODEX_BRIDGE_HOST: 0.0.0.0
      LUJIE_RUNTIME_CONFIG_DIR: /runtime-config
    volumes:
      - codex-home:/codex
      - lujie-runtime-config:/runtime-config
    restart: unless-stopped

volumes:
  lujie-data:
  codex-home:
  lujie-runtime-config:
