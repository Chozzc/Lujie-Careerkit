services:
  lujie-careerkit:
    build:
      context: .
    image: lujie-careerkit:codex
    command: ["npm", "run", "start", "--", "-H", "0.0.0.0"]
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_URL: file:/data/dev.db
      LUJIE_SETTINGS_SECRET: ${LUJIE_SETTINGS_SECRET:?Set LUJIE_SETTINGS_SECRET in .env.codex}
      CODEX_BRIDGE_URL: http://codex-bridge:4318
      CODEX_BRIDGE_TOKEN: ${CODEX_BRIDGE_TOKEN:?Set CODEX_BRIDGE_TOKEN in .env.codex}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-qwen3.6-flash}
    volumes:
      - lujie-data:/data
    depends_on:
      - codex-bridge
    restart: unless-stopped

  codex-bridge:
    image: lujie-careerkit:codex
    command: ["npm", "run", "codex:bridge:container"]
    environment:
      CODEX_HOME: /codex
      CODEX_BRIDGE_HOST: 0.0.0.0
      CODEX_BRIDGE_TOKEN: ${CODEX_BRIDGE_TOKEN:?Set CODEX_BRIDGE_TOKEN in .env.codex}
    volumes:
      - codex-home:/codex
    restart: unless-stopped

volumes:
  lujie-data:
  codex-home:
