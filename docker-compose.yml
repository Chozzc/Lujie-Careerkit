services:
  lujie-careerkit:
    build:
      context: .
    image: lujie-careerkit:local
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: file:/data/dev.db
      LUJIE_SETTINGS_SECRET: ${LUJIE_SETTINGS_SECRET:-change-me-to-a-long-random-string}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-qwen3.6-flash}
    volumes:
      - lujie-data:/data
    restart: unless-stopped

volumes:
  lujie-data:
